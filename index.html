<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Rafidain & Co. Gold Jewelry Pricing Dashboard - Stay Gold">
    <title>Rafidain & Co. | Gold Pricing Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
</head>

<body>

    <!-- Login Screen -->
    <div id="login-screen" class="login-screen">
        <div class="login-card">
            <div class="login-logo-wrap">
                <img src="logo-new.png" alt="Rafidain &amp; Co. Logo" class="login-logo">
            </div>
            <h1 class="login-title">Rafidain &amp; Co.</h1>
            <span class="login-tagline">STAY GOLD</span>
            <form id="login-form" autocomplete="off">
                <div class="login-field">
                    <label for="login-username" class="login-label">Username</label>
                    <input type="text" id="login-username" class="login-input" autocomplete="username" required>
                </div>
                <div class="login-field">
                    <label for="login-password" class="login-label">Password</label>
                    <input type="password" id="login-password" class="login-input" autocomplete="current-password"
                        required>
                </div>
                <div id="login-error" class="login-error"></div>
                <button type="submit" class="login-btn">Sign In</button>
            </form>
        </div>
    </div>

    <!-- Header -->
    <header id="main-header" class="hidden">
        <div class="header-inner">
            <div class="header-left">
                <div class="logo-wrap">
                    <img src="logo-new.png" alt="Rafidain & Co. Logo" id="header-logo">
                </div>
                <div class="header-brand">
                    <h1 id="site-title">Rafidain & Co.</h1>
                    <span id="site-tagline">STAY GOLD</span>
                </div>
            </div>
            <div class="header-right">
                <div class="header-time-block">
                    <span class="header-time" id="current-time"></span>
                    <span class="header-date" id="current-date"></span>
                </div>
                <button class="toolbar-btn" id="btn-logout" title="Logout">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                        <polyline points="16 17 21 12 16 7"></polyline>
                        <line x1="21" y1="12" x2="9" y2="12"></line>
                    </svg>
                </button>
            </div>
        </div>
        <div class="header-gold-line"></div>
    </header>

    <!-- Main -->
    <main id="main-content" class="hidden">

        <!-- Toolbar -->
        <div class="toolbar">
            <div class="toolbar-left">
                <h2 class="toolbar-title">Gold Pricing Sheet (Per KG)</h2>
            </div>
            <div class="toolbar-right">
                <button class="toolbar-btn" id="btn-refresh" title="Refresh">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="23 4 23 10 17 10"></polyline>
                        <polyline points="1 20 1 14 7 14"></polyline>
                        <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
                    </svg>
                </button>
                <button class="toolbar-btn" id="btn-print" title="Print">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="6 9 6 2 18 2 18 9"></polyline>
                        <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path>
                        <rect x="6" y="14" width="12" height="8"></rect>
                    </svg>
                </button>
            </div>
        </div>

        <!-- Table Card -->
        <div class="table-card">
            <table id="pricing-table">
                <thead>
                    <tr>
                        <th class="corner-cell"></th>
                        <th class="col-head">24K</th>
                        <th class="col-head">22K</th>
                        <th class="col-head">21K</th>
                        <th class="col-head">18K</th>
                        <th class="col-head">14K</th>
                        <th class="col-head">10K</th>
                    </tr>
                </thead>
                <tbody>
                    <tr data-row="sell">
                        <td class="row-label">Sell</td>
                        <td class="cell sheet-blank" data-row="sell" data-col="24K"></td>
                        <td class="cell price" data-row="sell" data-col="22K"></td>
                        <td class="cell price" data-row="sell" data-col="21K"></td>
                        <td class="cell price" data-row="sell" data-col="18K"></td>
                        <td class="cell price" data-row="sell" data-col="14K"></td>
                        <td class="cell price" data-row="sell" data-col="10K"></td>
                    </tr>
                    <tr data-row="buy">
                        <td class="row-label">Buy</td>
                        <td class="cell price" data-row="buy" data-col="24K"></td>
                        <td class="cell price" data-row="buy" data-col="22K"></td>
                        <td class="cell price" data-row="buy" data-col="21K"></td>
                        <td class="cell price" data-row="buy" data-col="18K"></td>
                        <td class="cell price" data-row="buy" data-col="14K"></td>
                        <td class="cell price" data-row="buy" data-col="10K"></td>
                    </tr>
                    <tr class="divider-row">
                        <td colspan="7">
                            <div class="divider-line"></div>
                        </td>
                    </tr>
                    <tr data-row="preowned">
                        <td class="row-label">Pre-owned</td>
                        <td class="cell sheet-blank" data-row="preowned" data-col="24K"></td>
                        <td class="cell price" data-row="preowned" data-col="22K"></td>
                        <td class="cell price" data-row="preowned" data-col="21K"></td>
                        <td class="cell price" data-row="preowned" data-col="18K"></td>
                        <td class="cell price" data-row="preowned" data-col="14K"></td>
                        <td class="cell price" data-row="preowned" data-col="10K"></td>
                    </tr>
                    <tr class="divider-row">
                        <td colspan="7">
                            <div class="divider-line"></div>
                        </td>
                    </tr>
                    <tr data-row="lira">
                        <td class="row-label">Lira</td>
                        <td class="cell sheet-blank" data-row="lira" data-col="24K"></td>
                        <td class="cell price" data-row="lira" data-col="22K"></td>
                        <td class="cell price" data-row="lira" data-col="21K"></td>
                        <td class="cell sheet-blank" colspan="3"></td>
                    </tr>
                    <tr class="divider-row">
                        <td colspan="7">
                            <div class="divider-line"></div>
                        </td>
                    </tr>
                    <tr data-row="braided">
                        <td class="row-label" rowspan="2">Braided Bangle</td>
                        <td class="cell sheet-sublabel" data-row="braided" data-col="24K" data-band="1-2">1-2 pcs</td>
                        <td class="cell price" data-row="braided" data-col="22K" data-band="1-2"></td>
                        <td class="cell price" data-row="braided" data-col="21K" data-band="1-2"></td>
                        <td class="cell sheet-blank" colspan="3"></td>
                    </tr>
                    <tr data-row="braided">
                        <td class="cell sheet-sublabel" data-row="braided" data-col="24K" data-band="3-6">3-6 pcs</td>
                        <td class="cell price" data-row="braided" data-col="22K" data-band="3-6"></td>
                        <td class="cell price" data-row="braided" data-col="21K" data-band="3-6"></td>
                        <td class="cell sheet-blank" colspan="3"></td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- Gold Bars Card -->
        <div class="table-card bars-card">
            <table id="bars-table">
                <thead>
                    <tr>
                        <th class="bars-header" colspan="2">Gold Bars — 24K</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td class="bar-label">100g</td>
                        <td class="cell bar-price" data-bar="100g"></td>
                    </tr>
                    <tr>
                        <td class="bar-label">50g</td>
                        <td class="cell bar-price" data-bar="50g"></td>
                    </tr>
                    <tr class="highlight">
                        <td class="bar-label">1 oz</td>
                        <td class="cell bar-price" data-bar="1oz"></td>
                    </tr>
                    <tr>
                        <td class="bar-label">20g</td>
                        <td class="cell bar-price" data-bar="20g"></td>
                    </tr>
                    <tr>
                        <td class="bar-label">1/2 oz</td>
                        <td class="cell bar-price" data-bar="half-oz"></td>
                    </tr>
                    <tr>
                        <td class="bar-label">10g</td>
                        <td class="cell bar-price" data-bar="10g"></td>
                    </tr>
                    <tr>
                        <td class="bar-label">5g</td>
                        <td class="cell bar-price" data-bar="5g"></td>
                    </tr>
                    <tr>
                        <td class="bar-label">2.5g</td>
                        <td class="cell bar-price" data-bar="2-5g"></td>
                    </tr>
                    <tr>
                        <td class="bar-label">1g</td>
                        <td class="cell bar-price" data-bar="1g"></td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- Status Bar -->
        <div class="bottom-bar">
            <span class="cell-ref" id="cell-indicator">Ready</span>
        </div>

    </main>

    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
    <script src="script.js"></script>
</body>

</html>
